<!DOCTYPE html>
<html lang="en">

<title>Henig — Annual Budget Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#111318;--ink-2:#3d4149;--ink-3:#8a909c;
  --white:#ffffff;--surface:#f7f8fa;--surface-2:#eef0f4;
  --border:#e2e5eb;--border-2:#d0d4dc;
  --accent:#2563eb;--accent-pale:#eff4ff;--accent-mid:#93b4f8;
  --emerald:#15803d;--emerald-pale:#dcfce7;
  --ruby:#b91c1c;--ruby-pale:#fee2e2;
  --amber:#92400e;--amber-pale:#fef3c7;
  --gold:#b45309;--gold-pale:#fef9ef;
  --violet:#7c3aed;--violet-pale:#f5f3ff;
  --heat-lo:#dbeafe;--heat-hi:#1e40af;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 3rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.main{max-width:1180px;margin:0 auto;padding:2rem 2rem 4rem;}
/* Controls */
.controls-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:1.25rem;align-items:flex-end;}
.ctrl-group{display:flex;flex-direction:column;gap:6px;}
.ctrl-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-3);}
select,button{font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:8px 12px;background:var(--white);color:var(--ink);cursor:pointer;outline:none;}
select:focus{border-color:var(--accent-mid);}
.view-toggle{display:flex;gap:0;}
.view-toggle button{border-radius:0;border-right:none;transition:background 0.15s,color 0.15s;}
.view-toggle button:first-child{border-radius:8px 0 0 8px;}
.view-toggle button:last-child{border-radius:0 8px 8px 0;border-right:1px solid var(--border);}
.view-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;}
.stat-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px;}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--ink);}
.stat-sub{font-size:11px;color:var(--ink-3);margin-top:3px;}
/* Heatmap */
.section-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:1rem;}
.heatmap-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:0.5rem;}
.heat-cell{border-radius:10px;padding:10px 6px;text-align:center;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:transform 0.1s;}
.heat-cell:hover{transform:translateY(-2px);}
.heat-month{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;opacity:0.75;}
.heat-amt{font-size:12px;font-weight:500;}
.heat-star{font-size:14px;}
/* Bar chart */
.bar-chart{display:flex;gap:4px;align-items:flex-end;height:100px;margin-bottom:1.5rem;margin-top:1rem;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-col{width:100%;border-radius:4px 4px 0 0;background:var(--accent);transition:height 0.4s;min-height:3px;}
.bar-lbl{font-size:9px;color:var(--ink-3);letter-spacing:0.05em;}
/* Key dates */
.key-dates{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1.5rem;}
.kd-item{display:flex;gap:1rem;padding:10px 0;border-bottom:1px solid var(--border);}
.kd-item:last-child{border-bottom:none;}
.kd-date{font-size:11px;font-weight:500;color:var(--accent);min-width:130px;}
.kd-label{font-size:13px;font-weight:500;margin-bottom:3px;}
.kd-desc{font-size:12px;color:var(--ink-2);line-height:1.5;}
/* Banner */
.banner{background:var(--accent-pale);border:1px solid var(--accent-mid);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.banner-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:500;white-space:nowrap;}
.banner-text{font-size:13px;color:var(--ink-2);line-height:1.6;}
.banner select{background:var(--white);border-color:var(--accent-mid);font-size:12px;padding:6px 10px;}
/* Monthly cards */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.month-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;}
.mc-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.mc-name{font-family:'Playfair Display',serif;font-size:18px;}
.mc-year{font-size:11px;color:var(--ink-3);}
.mc-amount{font-size:22px;font-weight:500;color:var(--accent);margin-bottom:8px;}
.mc-bar-bg{background:var(--surface-2);height:5px;border-radius:99px;margin-bottom:10px;}
.mc-bar-fill{height:5px;border-radius:99px;background:var(--accent);transition:width 0.4s;}
.mc-peak{display:inline-block;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:99px;margin-bottom:10px;}
.mc-peak.high{background:var(--ruby-pale);color:var(--ruby);}
.mc-peak.mid{background:var(--amber-pale);color:var(--amber);}
.mc-peak.low{background:var(--surface-2);color:var(--ink-3);}
.mc-channels{margin-bottom:10px;}
.ch-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.ch-name{font-size:10px;color:var(--ink-2);min-width:110px;}
.ch-bar-bg{flex:1;background:var(--surface-2);height:4px;border-radius:99px;}
.ch-bar-fill{height:4px;border-radius:99px;}
.ch-pct{font-size:10px;color:var(--ink-3);min-width:28px;text-align:right;}
.mc-reason{font-size:11px;color:var(--ink-2);line-height:1.5;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}
.mc-plan{font-size:10px;color:var(--ink-3);margin-top:4px;font-style:italic;}
/* Channel colors */
.ch-google{background:#f59e0b;}
.ch-meta{background:#3b82f6;}
.ch-pinterest{background:#ec4899;}
.ch-email{background:#10b981;}
.ch-influencer{background:#8b5cf6;}
.panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
@media(max-width:900px){.stats-row{grid-template-columns:1fr 1fr;}.month-grid{grid-template-columns:1fr 1fr;}.heatmap-grid{grid-template-columns:repeat(6,1fr);}}
@media(max-width:600px){.stats-row{grid-template-columns:1fr;}.month-grid{grid-template-columns:1fr;}.controls-card{flex-direction:column;}}
</style>
</head>

const ANNUAL_BUDGETS = {

const TAM_DATA = {
  USA:     { luxury: '$13.5B', mid: '$11.2B', mix: '$13.5B' },
  Germany: { luxury: '$1.71B', mid: '$1.71B', mix: '$1.71B' },

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentView = 'year';
let state = { country:'USA', segment:'luxury', intensity:'mid' };

function getAnnualBudget() {
  const base = ANNUAL_BUDGETS[state.country][state.intensity];
  return Math.round(base * SEG_MULT[state.segment]);
}

function fmt(n) {
  if(n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if(n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}

function lerp(a, b, t) {
  return Math.round(a + (b - a) * t);
}

function heatColor(pct, min, max) {
  const t = max === min ? 0 : (pct - min) / (max - min);
  // Interpolate from --heat-lo to --heat-hi
  const r = lerp(219, 30, t);
  const g = lerp(234, 64, t);
  const b2 = lerp(254, 175, t);
  return `rgb(${r},${g},${b2})`;
}

function setView(v) {
  currentView = v;
  document.getElementById('viewYear').style.display = v==='year' ? '' : 'none';
  document.getElementById('viewMonth').style.display = v==='month' ? '' : 'none';
  document.getElementById('btnYear').classList.toggle('active', v==='year');
  document.getElementById('btnMonth').classList.toggle('active', v==='month');
  render();
}

function render() {
  const annual = getAnnualBudget();
  const alloc = ALLOC[state.country];
  const amounts = alloc.map(p => Math.round(annual * p));
  const sorted = [...amounts].sort((a,b) => b-a);
  const top3 = new Set(sorted.slice(0,3));
  const maxAmt = Math.max(...amounts);
  const minAmt = Math.min(...amounts);
  const peakIdx = amounts.indexOf(maxAmt);

  // Stats row
  const q4months = [5,6,7]; // Oct, Nov, Dec in our array (indices)
  const q4spend = q4months.reduce((s,i)=>s+amounts[i],0);
  const q1months = [10,11,0,1]; // Mar, Apr, May, Jun
  const q1spend = [10,11].reduce((s,i)=>s+amounts[i],0);

  const tam = (TAM_DATA[state.country] || {})[state.segment] || '—';
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Year 1 Budget</div>
      <div class="stat-val">${fmt(annual)}</div>
      <div class="stat-sub">${state.intensity.charAt(0).toUpperCase()+state.intensity.slice(1)} intensity · ${state.country}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Segment TAM</div>
      <div class="stat-val" style="color:var(--accent)">${tam}</div>
      <div class="stat-sub">${state.country} · ${state.segment==='luxury'?'Luxury':state.segment==='mid'?'Mid-Luxury':'Mixed'} · 2025</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Peak Month</div>
      <div class="stat-val">${MONTH_NAMES[peakIdx]} '${String(MONTH_YEARS[peakIdx]).slice(2)}</div>
      <div class="stat-sub">${fmt(maxAmt)} · ${(alloc[peakIdx]*100).toFixed(1)}% of annual</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Q4 Spend (Oct–Dec)</div>
      <div class="stat-val">${fmt(q4spend)}</div>
      <div class="stat-sub">${((q4spend/annual)*100).toFixed(0)}% of annual budget</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Quietest Quarter</div>
      <div class="stat-val">${fmt(q1spend)}</div>
      <div class="stat-sub">Mar–Apr · ${((q1spend/annual)*100).toFixed(0)}% of annual</div>
    </div>`;

  if(currentView === 'year') renderYear(amounts, alloc, maxAmt, minAmt, top3);
  else renderMonth(amounts, alloc, top3);
}

function renderYear(amounts, alloc, maxAmt, minAmt, top3) {
  // Heatmap
  const heat = document.getElementById('heatmap');
  heat.innerHTML = MONTH_NAMES.map((m,i) => {
    const a = amounts[i];
    const bg = heatColor(a, minAmt, maxAmt);
    const t = maxAmt === minAmt ? 0 : (a - minAmt)/(maxAmt - minAmt);
    const txtColor = t > 0.55 ? '#fff' : '#1e3a8a';
    const star = top3.has(a) ? '<div class="heat-star">★</div>' : '';
    return `<div class="heat-cell" style="background:${bg};color:${txtColor};">
      <div class="heat-month">${m}</div>
      <div class="heat-amt">${fmt(a)}</div>
      ${star}
    </div>`;
  }).join('');

  // Bar chart
  const bar = document.getElementById('barChart');
  bar.innerHTML = amounts.map((a,i) => {
    const h = Math.max(4, Math.round((a/maxAmt)*90));
    return `<div class="bar-wrap">
      <div class="bar-col" style="height:${h}px;opacity:${0.5+0.5*(a/maxAmt)};"></div>
      <div class="bar-lbl">${MONTH_NAMES[i].slice(0,3)}</div>
    </div>`;
  }).join('');

  // Key dates
  const kd = document.getElementById('keyDates');
  const dates = KEY_DATES[state.country];
  kd.innerHTML = `<div class="section-title" style="margin-bottom:1rem;">Key Dates — ${state.country}</div>` +
    dates.map(d => `<div class="kd-item">
      <div class="kd-date">${d.date}</div>
      <div>
        <div class="kd-label">${d.label}</div>
        <div class="kd-desc">${d.desc}</div>
      </div>
    </div>`).join('');
}

function renderMonth(amounts, alloc, top3) {
  updateBanner();
  const maxAmt = Math.max(...amounts);
  const reasons = REASONS[state.country];
  const peaks = PEAK_LABELS[state.country];

  document.getElementById('monthGrid').innerHTML = MONTH_NAMES.map((m,i) => {
    const a = amounts[i];
    const pct = alloc[i] * 100;
    const barW = Math.round((a/maxAmt)*100);
    const peakLabel = peaks[i];
    let peakCls = 'low', peakTxt = 'Quiet Period';
    if(peakLabel && peakLabel.startsWith('★')) { peakCls='high'; peakTxt=peakLabel; }
    else if(peakLabel) { peakCls='mid'; peakTxt=peakLabel; }

    const chans = CHANNEL_MIX[i];
    const chHTML = Object.entries(chans).map(([k,v])=>{
      const info = CH[k] || { cls:'ch-google', label:k };
      return `<div class="ch-row">
        <span class="ch-name">${info.label}</span>
        <div class="ch-bar-bg"><div class="ch-bar-fill ${info.cls}" style="width:${Math.round(v*100)}%"></div></div>
        <span class="ch-pct">${Math.round(v*100)}%</span>
      </div>`;
    }).join('');

    return `<div class="month-card">
      <div class="mc-header">
        <div class="mc-name">${m}</div>
        <div class="mc-year">${MONTH_YEARS[i]}</div>
      </div>
      <div class="mc-amount">${fmt(a)}</div>
      <div class="mc-bar-bg"><div class="mc-bar-fill" style="width:${barW}%"></div></div>
      <div style="font-size:10px;color:var(--ink-3);margin-bottom:8px;">${pct.toFixed(1)}% of annual budget</div>
      ${peakLabel ? `<span class="mc-peak ${peakCls}">${peakTxt}</span>` : ''}
      <div class="mc-channels">${chHTML}</div>
      <div class="mc-reason">${reasons[i]}</div>
      <div class="mc-plan">${PLAN_HINTS[i]}</div>
    </div>`;
  }).join('');
}

function updateBanner() {
  const target = document.getElementById('targetPeak').value;
  const recs = BANNER_RECS[target];
  document.getElementById('bannerText').innerHTML = recs[state.country] || '';
}

// Wire controls
['countrySelect','segmentSelect','intensitySelect'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    state.country  = document.getElementById('countrySelect').value;
    state.segment  = document.getElementById('segmentSelect').value;
    state.intensity= document.getElementById('intensitySelect').value;
    render();
  });
});

render();
</script>
